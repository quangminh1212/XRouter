name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify formatting
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "unformatted files:"
            echo "$fmt"
            exit 1
          fi

      - name: Static analysis
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/xrouter
